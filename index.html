<!DOCTYPE html>
<html>
<head>
    <title>Custom Live TV Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    
    <style>
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }
        /* Your Custom Logo Styling */
        #custom-splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Sits on top of the video player initially */
        }
        #custom-splash-screen img {
            max-width: 40%;
            height: auto;
        }
    </style>
</head>
<body>

    <div id="custom-splash-screen">
        <img src="https://github.com/Balakrishnan23962/Casting/blob/main/WhatsApp%20Image%202026-07-10%20at%205.26.15%20PM.jpeg" alt="App Logo">
    </div>

    <cast-media-player></cast-media-player>

    <script src="receiver.js"></script>

</body>
</html>
